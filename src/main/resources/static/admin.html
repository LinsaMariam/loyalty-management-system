<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Admin - Member Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body {
          font-family: 'Inter', sans-serif;
          background-color: #f1f3f6;
        }
        .table-responsive {
          background-color: #fff;
          border-radius: 10px;
          box-shadow: 0 2px 6px rgba(0,0,0,0.08);
          padding: 1rem;
        }
        .btn-primary, .btn-success {
          background-color: #2874f0;
          border: none;
        }
        .btn-primary:hover, .btn-success:hover {
          background-color: #1a5dc7;
        }
        h2, h5 {
          color: #2874f0;
        }
        .password-toggle {
          cursor: pointer;
          position: absolute;
          top: 50%;
          right: 10px;
          transform: translateY(-50%);
          color: #6c757d;
        }
        .position-relative {
          position: relative;
        }
    </style>
</head>
<body class="container mt-5">

<!-- Header with Logout -->
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>🔍 Loyalty Members Search</h2>
    <button class="btn btn-danger" onclick="logout()">Logout</button>
</div>

<!-- Basic Search -->
<div class="mb-3 row">
    <div class="col-md-3">
        <input type="text" id="memberId" class="form-control" placeholder="Member ID (e.g., EM100028)" />
    </div>
    <div class="col-md-3">
        <input type="text" id="email" class="form-control" placeholder="Email (e.g., john.doe@example.com)" />
    </div>
    <div class="col-md-6">
        <button class="btn btn-primary me-2" onclick="searchMember()">Search</button>
        <button class="btn btn-secondary me-2" onclick="getAllMembers()">Get All Members</button>
    </div>
</div>

<!-- Advanced Filter -->
<h5 class="mb-3">Advanced Filter Search</h5>
<div class="mb-4 row">
    <div class="col-md-2"><input type="text" id="filterMembershipNumber" class="form-control" placeholder="Member ID"/></div>
    <div class="col-md-2"><input type="text" id="filterGivenName" class="form-control" placeholder="Given Name"/></div>
    <div class="col-md-2"><input type="text" id="filterFamilyName" class="form-control" placeholder="Family Name"/></div>
    <div class="col-md-2"><input type="text" id="filterCountryOfResidence" class="form-control" placeholder="Country of Residence"/></div>
    <div class="col-md-2"><input type="text" id="filterCompanyCode" class="form-control" placeholder="Company Code"/></div>
    <div class="col-md-2"><button class="btn btn-success" onclick="filterMembers()">Filter Search</button></div>
</div>

<!-- Results Table -->
<div class="table-responsive">
    <table class="table table-bordered table-striped align-middle">
        <thead class="table-light">
        <tr>
            <th>SL No.</th>
            <th>Membership Number</th>
            <th>Given Name</th>
            <th>Family Name</th>
            <th>Email</th>
            <th>Country of Residence</th>
            <th>Company Code</th>
            <th>More Info</th>
        </tr>
        </thead>
        <tbody id="resultsTable"></tbody>
    </table>
</div>

<!-- Pagination -->
<div class="my-3">
    <button class="btn btn-outline-primary me-2" onclick="previousPage()">Previous</button>
    <button class="btn btn-outline-primary" onclick="nextPage()">Next</button>
</div>

<!-- Member Detail Modal -->
<div class="modal fade" id="memberDetailModal" tabindex="-1" aria-labelledby="modalTitle" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="modalTitle">Member Details</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>
</div>

<!-- Login Modal -->
<div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="loginModalLabel">Admin Login</h5>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label for="loginUsername" class="form-label">Username</label>
                    <input type="text" class="form-control" id="loginUsername" placeholder="Enter Username">
                </div>
                <div class="mb-3 position-relative">
                    <label for="loginPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" id="loginPassword" placeholder="Enter Password">
                    <i class="bi bi-eye-slash password-toggle" id="togglePassword" onclick="togglePasswordVisibility()"></i>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" onclick="authenticate()">Login</button>
            </div>
        </div>
    </div>
</div>

<script>
    let username = sessionStorage.getItem('username');
    let password = sessionStorage.getItem('password');
    let currentPage = 0;
    let isFilterActive = false;

    function authenticate() {
        username = document.getElementById('loginUsername').value.trim();
        password = document.getElementById('loginPassword').value.trim();

        if (!username || !password) {
            alert('Both Username and Password are required.');
            return;
        }

        sessionStorage.setItem('username', username);
        sessionStorage.setItem('password', password);
        bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
        alert('Login successful!');
    }

    function togglePasswordVisibility() {
        const passwordField = document.getElementById('loginPassword');
        const toggleIcon = document.getElementById('togglePassword');

        if (passwordField.type === 'password') {
            passwordField.type = 'text';
            toggleIcon.classList.remove('bi-eye-slash');
            toggleIcon.classList.add('bi-eye');
        } else {
            passwordField.type = 'password';
            toggleIcon.classList.remove('bi-eye');
            toggleIcon.classList.add('bi-eye-slash');
        }
    }

    function logout() {
        sessionStorage.clear();
        alert('Logged out successfully!');
        window.location.reload();
    }

    function searchMember() {
        const memberId = document.getElementById('memberId').value.trim();
        const email = document.getElementById('email').value.trim();

        if (memberId && email) return alert('Please enter either Membership Number or Email, not both.');
        if (!memberId && !email) return alert('Please enter a Membership Number or Email to search.');

        let url = memberId
            ? `/api/admin/id/${encodeURIComponent(memberId)}`
            : `/api/admin/email/${encodeURIComponent(email)}`;

        fetch(url, {
            headers: { 'Authorization': 'Basic ' + btoa(username + ':' + password) }
        })
        .then(res => res.ok ? res.json() : Promise.reject())
        .then(data => renderTable([data]))
        .catch(() => {
            alert('No member found.');
            renderTable([]);
        });
    }

    function getAllMembers() {
        isFilterActive = false;
        fetch(`/api/admin/all?page=${currentPage}&size=10`, {
            headers: { 'Authorization': 'Basic ' + btoa(username + ':' + password) }
        })
        .then(res => res.ok ? res.json() : Promise.reject())
        .then(data => renderTable(data.content || []))
        .catch(() => {
            alert('Error fetching members.');
            renderTable([]);
        });
    }

    function filterMembers(preservePage = false) {
        if (!preservePage) currentPage = 0;
        isFilterActive = true;

        const params = new URLSearchParams({
            page: currentPage,
            size: 10,
            membershipNumber: document.getElementById('filterMembershipNumber').value.trim(),
            givenName: document.getElementById('filterGivenName').value.trim(),
            familyName: document.getElementById('filterFamilyName').value.trim(),
            countryOfResidence: document.getElementById('filterCountryOfResidence').value.trim(),
            companyCode: document.getElementById('filterCompanyCode').value.trim()
        });

        fetch(`/api/admin?${params.toString()}`, {
            headers: { 'Authorization': 'Basic ' + btoa(username + ':' + password) }
        })
        .then(res => res.ok ? res.json() : Promise.reject())
        .then(data => renderTable(data.content || []))
        .catch(() => {
            alert('No members found with given filters.');
            renderTable([]);
        });
    }

    function nextPage() {
        currentPage++;
        isFilterActive ? filterMembers(true) : getAllMembers();
    }

    function previousPage() {
        if (currentPage > 0) currentPage--;
        isFilterActive ? filterMembers(true) : getAllMembers();
    }

    function renderTable(members) {
        const tbody = document.getElementById('resultsTable');
        tbody.innerHTML = members.length ? '' : '<tr><td colspan="8">No records found.</td></tr>';

        members.forEach((member, index) => {
            const c = member.contactDetails || {};
            const serialNumber = currentPage * 10 + index + 1;

            tbody.innerHTML += `
                <tr>
                    <td>${serialNumber}</td>
                    <td>${member.membershipNumber || ''}</td>
                    <td>${member.givenName || ''}</td>
                    <td>${member.familyName || ''}</td>
                    <td>${c.emailAddress || ''}</td>
                    <td>${member.countryOfResidence || ''}</td>
                    <td>${member.companyCode || ''}</td>
                    <td><button class="btn btn-sm btn-info" onclick='showDetails(${JSON.stringify(member)})'>View</button></td>
                </tr>`;
        });
    }

    function showDetails(member) {
        const c = member.contactDetails || {};
        document.getElementById('modalBody').innerHTML = `
            <div class="row g-2">
                <div class="col-md-6"><strong>Membership Number:</strong> ${member.membershipNumber || ''}</div>
                <div class="col-md-6"><strong>Given Name:</strong> ${member.givenName || ''}</div>
                <div class="col-md-6"><strong>Family Name:</strong> ${member.familyName || ''}</div>
                <div class="col-md-6"><strong>Gender:</strong> ${member.gender || ''}</div>
                <div class="col-md-6"><strong>Date of Birth:</strong> ${member.dateOfBirth || ''}</div>
                <div class="col-md-6"><strong>Nationality:</strong> ${member.nationality || ''}</div>
                <div class="col-md-6"><strong>Country of Residence:</strong> ${member.countryOfResidence || ''}</div>
                <div class="col-md-6"><strong>Company Code:</strong> ${member.companyCode || ''}</div>
                <div class="col-md-6"><strong>Preferred Language:</strong> ${member.preferredLanguage || ''}</div>
                <div class="col-12"><hr/></div>

                <div class="col-12"><strong>Permanent Address</strong></div>
                <div class="col-md-6"><strong>Address:</strong> ${c.permanentAddress || ''}</div>
                <div class="col-md-6"><strong>City:</strong> ${c.permanentCity || ''}</div>
                <div class="col-md-6"><strong>State:</strong> ${c.permanentState || ''}</div>
                <div class="col-md-6"><strong>Country:</strong> ${c.permanentCountry || ''}</div>
                <div class="col-md-6"><strong>Zip Code:</strong> ${c.permanentZipCode || ''}</div>

                <div class="col-12 mt-3"><strong>Present Address</strong></div>
                <div class="col-md-6"><strong>Address:</strong> ${c.presentAddress || ''}</div>
                <div class="col-md-6"><strong>City:</strong> ${c.presentCity || ''}</div>
                <div class="col-md-6"><strong>State:</strong> ${c.presentState || ''}</div>
                <div class="col-md-6"><strong>Country:</strong> ${c.presentCountry || ''}</div>
                <div class="col-md-6"><strong>Zip Code:</strong> ${c.presentZipCode || ''}</div>

                <div class="col-12"><hr/></div>
                <div class="col-md-6"><strong>Email:</strong> ${c.emailAddress || ''}</div>
                <div class="col-md-6"><strong>Phone:</strong> ${c.phoneNumber || ''}</div>
                <div class="col-md-6"><strong>Mobile:</strong> ${c.mobileNumber || ''}</div>
            </div>`;
        new bootstrap.Modal(document.getElementById('memberDetailModal')).show();
    }

    document.addEventListener('DOMContentLoaded', function() {
        if (!sessionStorage.getItem('username') || !sessionStorage.getItem('password')) {
            const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
            loginModal.show();
        }
    });
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
