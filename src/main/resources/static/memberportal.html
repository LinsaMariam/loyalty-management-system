<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Member Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body {
          font-family: 'Inter', sans-serif;
          background-color: #f1f3f6;
          margin: 0;
        }
        .sidebar {
          width: 220px;
          background-color: #fff;
          border-right: 1px solid #e0e0e0;
          padding: 1.5rem 1rem;
          position: fixed;
          top: 0;
          bottom: 0;
          box-shadow: 2px 0 6px rgba(0,0,0,0.05);
        }
        .sidebar h4 {
          font-weight: 600;
          margin-bottom: 2rem;
          color: #2874f0;
        }
        .sidebar a {
          display: block;
          padding: 0.75rem 1rem;
          margin-bottom: 0.5rem;
          text-decoration: none;
          color: #333;
          border-radius: 6px;
          font-weight: 500;
        }
        .sidebar a:hover {
          background-color: #2874f0;
          color: #fff;
        }
        .main-content {
          margin-left: 240px;
          padding: 2rem;
        }
        .card-box {
          background-color: #fff;
          border-radius: 10px;
          box-shadow: 0 2px 6px rgba(0,0,0,0.08);
          padding: 1.5rem;
          margin-bottom: 1.5rem;
        }
        .section-title {
          font-size: 1.25rem;
          font-weight: 600;
          margin-bottom: 1rem;
        }
        .highlight-box {
          display: flex;
          gap: 2rem;
          flex-wrap: wrap;
        }
        .highlight {
          background-color: #eaf4ff;
          padding: 1rem 1.5rem;
          border-radius: 8px;
          font-size: 1.1rem;
          font-weight: 600;
          color: #2874f0;
        }
        .details strong {
          display: block;
          margin-top: 0.75rem;
          color: #555;
        }
        .details span {
          display: block;
          margin-top: 0.25rem;
          color: #333;
        }
        .action-grid {
          display: grid;
          grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
          gap: 1rem;
        }
        .reward-heading {
          font-size: 1.15rem;
          font-weight: 600;
          margin: 1rem 0;
        }
        .action-button {
          background-color: #fff;
          border: 1px solid #ddd;
          padding: 0.75rem;
          text-align: center;
          border-radius: 8px;
          font-weight: 500;
          color: #2874f0;
          cursor: pointer;
          transition: all 0.3s ease;
        }
        .action-button:hover {
          background-color: #2874f0;
          color: #fff;
          box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h4>Dashboard</h4>
    <a href="#" onclick="updateProfile()">✏️ Update Profile</a>
    <a href="#" onclick="bookFlight()">✈️ Book Flight</a>
    <a href="#" onclick="deleteMember()">🗑️ Delete Account</a>
    <a href="#" onclick="logout()">🔓 Logout</a>
</div>

<div class="main-content">
    <div class="card-box">
        <div class="section-title">👋 Hello, <span id="memberName">Member</span></div>
        <div class="highlight-box">
            <div class="highlight" id="tier">Tier: Bronze</div>
            <div class="highlight" id="points">Points: 0</div>
        </div>
    </div>

    <div class="card-box">
        <div class="section-title">📋 Member Details</div>
        <div class="details" id="details"></div>
    </div>

    <div class="card-box">
        <div class="reward-heading">Need More Rewards? 🎯</div>
        <div class="action-grid">
            <div class="action-button" onclick="bookFlight()">✈️ Book Flight</div>
        </div>
    </div>
</div>

<script>
    let member;

    const memberDataJson = sessionStorage.getItem('memberData');
    if (!memberDataJson) {
      alert('Please login first.');
      window.location.href = '/login.html';
    } else {
      try {
        member = JSON.parse(memberDataJson);
      } catch (e) {
        alert('Invalid member data. Please login again.');
        sessionStorage.removeItem('memberData');
        window.location.href = '/login.html';
      }

      if (!member?.membershipNumber) {
        alert('Invalid member data. Please login again.');
        sessionStorage.removeItem('memberData');
        window.location.href = '/login.html';
      }

      document.getElementById('memberName').innerText = member.givenName || 'Member';
      document.getElementById('tier').innerText = `Tier: ${member.loyaltyTier || 'Bronze'}`;
      document.getElementById('points').innerText = `Points: ${member.rewardPoints || 0}`;

      fetch(`/api/members/portal/${member.membershipNumber}`)
        .then(res => res.ok ? res.json() : Promise.reject('Failed to fetch details'))
        .then(data => {
          sessionStorage.setItem('memberData', JSON.stringify(data));
          member = data;

          document.getElementById('memberName').innerText = `${member.givenName || ''} ${member.familyName || ''}`.trim();
          document.getElementById('tier').innerText = `Tier: ${member.loyaltyTier || 'Bronze'}`;
          document.getElementById('points').innerText = `Points: ${member.rewardPoints || 0}`;

          document.getElementById('details').innerHTML = `
            <strong>Membership Number</strong><span>${member.membershipNumber}</span>
            <strong>Email</strong><span>${member.contactDetails?.emailAddress || 'N/A'}</span>
            <strong>Country</strong><span>${member.countryOfResidence || 'N/A'}</span>
          `;
        })
        .catch(() => {
          document.getElementById('details').innerHTML = `
            <strong>Membership Number</strong><span>${member.membershipNumber}</span>
            <strong>Email</strong><span>${member.contactDetails?.emailAddress || 'N/A'}</span>
            <strong>Country</strong><span>${member.countryOfResidence || 'N/A'}</span>
          `;
        });
    }

    function updateProfile() { window.location.href = '/updateprofile.html'; }
    function bookFlight() { window.location.href = '/flightbooking.html'; }
    function logout() {
      sessionStorage.removeItem('memberData');
      window.location.href = '/index.html';
    }

    async function deleteMember() {
      const confirmDelete = confirm('⚠️ Are you sure you want to delete your account? This cannot be undone.');
      if (!confirmDelete || !member?.membershipNumber) return;

      try {
        const res = await fetch(`/api/members/delete/${member.membershipNumber}`, {
          method: 'DELETE'
        });

        if (!res.ok) throw new Error('Failed to delete member');

        alert('Account deleted successfully.');
        sessionStorage.removeItem('memberData');
        window.location.href = '/index.html';
      } catch (err) {
        alert(err.message);
      }
    }
</script>

</body>
</html>
