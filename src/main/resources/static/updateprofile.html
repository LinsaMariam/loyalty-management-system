<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Update Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet" />
    <style>
        body {
          font-family: 'Inter', sans-serif;
          background-color: #f2f4f8;
          padding: 2rem;
        }
        .form-box {
          max-width: 960px;
          margin: auto;
          background: #fff;
          padding: 2rem;
          border-radius: 12px;
          box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }
        .form-box h2 {
          color: #2874f0;
          margin-bottom: 1.5rem;
        }
        .form-control {
          margin-bottom: 1rem;
        }
        .section-title {
          font-weight: 600;
          margin-top: 2rem;
          margin-bottom: 1rem;
          color: #555;
        }
        label.checkbox-label {
          margin-bottom: 1rem;
          display: block;
          font-weight: 500;
        }
    </style>
</head>
<body>

<div class="form-box">
    <h2>Update Profile</h2>
    <form id="updateForm">

        <!-- Personal Details -->
        <div class="section-title">Personal Details</div>
        <input type="text" id="givenName" class="form-control" placeholder="Given Name" required />
        <input type="text" id="familyName" class="form-control" placeholder="Family Name" />
        <input type="date" id="dateOfBirth" class="form-control" placeholder="Date of Birth" />
        <select id="gender" class="form-control">
            <option value="">Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
            <option value="Other">Other</option>
        </select>
        <input type="text" id="nationality" class="form-control" placeholder="Nationality" />
        <input type="text" id="countryOfResidence" class="form-control" placeholder="Country of Residence" />
        <input type="text" id="preferredLanguage" class="form-control" placeholder="Preferred Language" />
        <input type="text" id="preferredAddress" class="form-control" placeholder="Preferred Address" />
        <input type="text" id="companyCode" class="form-control" placeholder="Company Code" />

        <!-- New Password Field -->
        <input type="password" id="password" class="form-control" placeholder="New Password (leave blank to keep current)" />

        <!-- Contact Details -->
        <div class="section-title">Contact Details</div>
        <input type="email" id="emailAddress" class="form-control" placeholder="Email Address" required />
        <input type="text" id="mobileNumber" class="form-control" placeholder="Mobile Number" />
        <input type="text" id="phoneNumber" class="form-control" placeholder="Phone Number" />

        <!-- Permanent Address -->
        <div class="section-title">Permanent Address</div>
        <input type="text" id="permanentAddress" class="form-control" placeholder="Address Line" />
        <input type="text" id="permanentCity" class="form-control" placeholder="City" />
        <input type="text" id="permanentState" class="form-control" placeholder="State" />
        <input type="text" id="permanentCountry" class="form-control" placeholder="Country" />
        <input type="text" id="permanentZipCode" class="form-control" placeholder="Zip Code" />

        <!-- Present Address -->
        <div class="section-title">Present Address</div>
        <label class="checkbox-label">
            <input type="checkbox" id="sameAsPermanent" /> Same as permanent address
        </label>
        <input type="text" id="presentAddress" class="form-control" placeholder="Address Line" />
        <input type="text" id="presentCity" class="form-control" placeholder="City" />
        <input type="text" id="presentState" class="form-control" placeholder="State" />
        <input type="text" id="presentCountry" class="form-control" placeholder="Country" />
        <input type="text" id="presentZipCode" class="form-control" placeholder="Zip Code" />

        <button type="submit" class="btn btn-primary w-100 mt-3">🔄 Update</button>
    </form>
</div>

<script>
    const member = JSON.parse(sessionStorage.getItem('memberData'));
    if (!member?.membershipNumber) {
      alert('Please login first.');
      window.location.href = '/login.html';
    }

    const contact = member.contactDetails || {};

    // Fill personal details
    document.getElementById('givenName').value = member.givenName || '';
    document.getElementById('familyName').value = member.familyName || '';
    document.getElementById('dateOfBirth').value = member.dateOfBirth || '';
    document.getElementById('gender').value = member.gender || '';
    document.getElementById('nationality').value = member.nationality || '';
    document.getElementById('countryOfResidence').value = member.countryOfResidence || '';
    document.getElementById('preferredLanguage').value = member.preferredLanguage || '';
    document.getElementById('preferredAddress').value = member.preferredAddress || '';
    document.getElementById('companyCode').value = member.companyCode || '';

    // Contact
    document.getElementById('emailAddress').value = contact.emailAddress || '';
    document.getElementById('mobileNumber').value = contact.mobileNumber || '';
    document.getElementById('phoneNumber').value = contact.phoneNumber || '';

    // Permanent
    document.getElementById('permanentAddress').value = contact.permanentAddress || '';
    document.getElementById('permanentCity').value = contact.permanentCity || '';
    document.getElementById('permanentState').value = contact.permanentState || '';
    document.getElementById('permanentCountry').value = contact.permanentCountry || '';
    document.getElementById('permanentZipCode').value = contact.permanentZipCode || '';

    // Present
    document.getElementById('presentAddress').value = contact.presentAddress || '';
    document.getElementById('presentCity').value = contact.presentCity || '';
    document.getElementById('presentState').value = contact.presentState || '';
    document.getElementById('presentCountry').value = contact.presentCountry || '';
    document.getElementById('presentZipCode').value = contact.presentZipCode || '';
    document.getElementById('sameAsPermanent').checked = !!member.sameAsPermanentAddress;

    // Submit
    document.getElementById('updateForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const payload = {
        givenName: givenName.value,
        familyName: familyName.value,
        dateOfBirth: dateOfBirth.value,
        gender: gender.value,
        nationality: nationality.value,
        countryOfResidence: countryOfResidence.value,
        preferredLanguage: preferredLanguage.value,
        preferredAddress: preferredAddress.value,
        companyCode: companyCode.value,
        password: password.value.trim() === '' ? null : password.value,
        emailAddress: emailAddress.value,
        mobileNumber: mobileNumber.value,
        phoneNumber: phoneNumber.value,
        permanentAddress: permanentAddress.value,
        permanentCity: permanentCity.value,
        permanentState: permanentState.value,
        permanentCountry: permanentCountry.value,
        permanentZipCode: permanentZipCode.value,
        presentAddress: sameAsPermanent.checked ? permanentAddress.value : presentAddress.value,
        presentCity: sameAsPermanent.checked ? permanentCity.value : presentCity.value,
        presentState: sameAsPermanent.checked ? permanentState.value : presentState.value,
        presentCountry: sameAsPermanent.checked ? permanentCountry.value : presentCountry.value,
        presentZipCode: sameAsPermanent.checked ? permanentZipCode.value : presentZipCode.value,
        sameAsPermanentAddress: sameAsPermanent.checked
      };

      fetch(`/api/members/update/${member.membershipNumber}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      })
      .then(res => res.ok ? res.json() : Promise.reject('Update failed'))
      .then(data => {
        alert(data.status || 'Profile updated!');
        sessionStorage.setItem('memberData', JSON.stringify(data));
        window.location.href = '/memberportal.html';
      })
      .catch(err => alert(err));
    });
</script>

</body>
</html>
