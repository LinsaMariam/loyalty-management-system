<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Member Enrolment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>
    <style>
        body { background-color: #f7f7f7; }
        h2 { color: #333; }
        .required::after { content: " *"; color: red; }
    </style>
</head>
<body class="container mt-5">
<h2 class="mb-4">📝 Enrol New Loyalty Member</h2>

<!-- Success Modal -->
<div class="modal fade" id="successModal" tabindex="-1" aria-labelledby="successModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-success">
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title" id="successModalLabel">Enrolment Success</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                ✅ Member enrolled successfully! Membership Number: <span id="membershipNumber"></span>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-primary" onclick="window.location.href='login.html'">OK</button>
            </div>
        </div>
    </div>
</div>

<!-- Error Modal -->
<div class="modal fade" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content border-danger">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title" id="errorModalLabel">❌ Enrolment Failed</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body" id="errorModalMessage"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-danger" data-bs-dismiss="modal">Close</button>
            </div>
        </div>
    </div>
</div>

<form id="enrolForm">
    <!-- Personal Details -->
    <h5>Personal Details</h5>
    <div class="row mb-3">
        <div class="col-md-4">
            <label for="givenName" class="form-label required">Given Name</label>
            <input type="text" class="form-control" id="givenName" required>
        </div>
        <div class="col-md-4">
            <label for="familyName" class="form-label">Family Name</label>
            <input type="text" class="form-control" id="familyName">
        </div>
        <div class="col-md-2">
            <label for="gender" class="form-label">Gender</label>
            <select class="form-select" id="gender">
                <option value="">Select Gender</option>
                <option value="Male">Male</option>
                <option value="Female">Female</option>
                <option value="Other">Other</option>
            </select>
        </div>
        <div class="col-md-2">
            <label for="dateOfBirth" class="form-label required">Date of Birth</label>
            <input type="date" class="form-control" id="dateOfBirth" required>
        </div>
    </div>

    <div class="row mb-3">
        <div class="col-md-3">
            <label for="countryOfResidence" class="form-label required">Country of Residence</label>
            <select class="form-select" id="countryOfResidence" required>
                <option value="">Select Country</option>
                <option value="India">India</option>
                <option value="United States">United States</option>
                <option value="United Kingdom">United Kingdom</option>
                <option value="Canada">Canada</option>
                <option value="Australia">Australia</option>
            </select>
        </div>
        <div class="col-md-3">
            <label for="nationality" class="form-label">Nationality</label>
            <input type="text" class="form-control" id="nationality">
        </div>
        <div class="col-md-3">
            <label for="companyCode" class="form-label">Company Code</label>
            <input type="text" class="form-control" id="companyCode">
        </div>
        <div class="col-md-3">
            <label for="preferredLanguage" class="form-label">Preferred Language</label>
            <select class="form-select" id="preferredLanguage">
                <option value="">Select Language</option>
                <option value="English">English</option>
                <option value="Spanish">Spanish</option>
                <option value="French">French</option>
                <option value="German">German</option>
                <option value="Hindi">Hindi</option>
                <option value="Mandarin">Mandarin</option>
            </select>
        </div>
    </div>

    <div class="mb-3">
        <label for="preferredAddress" class="form-label">Preferred Address Type</label>
        <select class="form-select" id="preferredAddress">
            <option value="">Select Address Type</option>
            <option value="Permanent">Permanent</option>
            <option value="Present">Present</option>
        </select>
    </div>

    <!-- Permanent Address -->
    <h5>Permanent Address</h5>
    <div class="row mb-3">
        <div class="col-md-4">
            <label for="permanentAddress" class="form-label required">Address</label>
            <input type="text" class="form-control" id="permanentAddress" required>
        </div>
        <div class="col-md-2">
            <label for="permanentCity" class="form-label required">City</label>
            <input type="text" class="form-control" id="permanentCity" required>
        </div>
        <div class="col-md-2">
            <label for="permanentCountry" class="form-label required">Country</label>
            <select class="form-select" id="permanentCountry" required>
                <option value="">Select Country</option>
                <option value="India">India</option>
                <option value="United States">United States</option>
                <option value="United Kingdom">United Kingdom</option>
                <option value="Canada">Canada</option>
                <option value="Australia">Australia</option>
            </select>
        </div>
        <div class="col-md-2">
            <label for="permanentState" class="form-label">State</label>
            <select class="form-select" id="permanentState">
                <option value="">Select State</option>
            </select>
        </div>
        <div class="col-md-2">
            <label for="permanentZipCode" class="form-label">Zip Code</label>
            <input type="text" class="form-control" id="permanentZipCode">
        </div>
    </div>

    <div class="form-check mb-3">
        <input class="form-check-input" type="checkbox" id="sameAsPermanentAddress">
        <label class="form-check-label" for="sameAsPermanentAddress">
            Copy Permanent Address to Present Address
        </label>
    </div>

    <!-- Present Address -->
    <h5>Present Address</h5>
    <div class="row mb-3">
        <div class="col-md-4">
            <label for="presentAddress" class="form-label required">Address</label>
            <input type="text" class="form-control" id="presentAddress" required>
        </div>
        <div class="col-md-2">
            <label for="presentCity" class="form-label required">City</label>
            <input type="text" class="form-control" id="presentCity" required>
        </div>
        <div class="col-md-2">
            <label for="presentCountry" class="form-label required">Country</label>
            <select class="form-select" id="presentCountry" required>
                <option value="">Select Country</option>
                <option value="India">India</option>
                <option value="United States">United States</option>
                <option value="United Kingdom">United Kingdom</option>
                <option value="Canada">Canada</option>
                <option value="Australia">Australia</option>
            </select>
        </div>
        <div class="col-md-2">
            <label for="presentState" class="form-label">State</label>
            <select class="form-select" id="presentState">
                <option value="">Select State</option>
            </select>
        </div>
        <div class="col-md-2">
            <label for="presentZipCode" class="form-label">Zip Code</label>
            <input type="text" class="form-control" id="presentZipCode">
        </div>
    </div>

    <!-- Contact Details -->
    <h5>Contact Details</h5>
    <div class="row mb-3">
        <div class="col-md-4">
            <label for="emailAddress" class="form-label required">Email</label>
            <input type="email" class="form-control" id="emailAddress" required>
        </div>
        <div class="col-md-4">
            <label for="phoneNumber" class="form-label">Phone Number</label>
            <input type="text" class="form-control" id="phoneNumber">
        </div>
        <div class="col-md-4">
            <label for="mobileNumber" class="form-label required">Mobile Number</label>
            <input type="text" class="form-control" id="mobileNumber" required>
        </div>
    </div>

    <!-- Password Section -->
    <div class="row mb-3">
        <div class="col-md-6">
            <label for="password" class="form-label required">Password</label>
            <div class="input-group">
                <input type="password" id="password" class="form-control" placeholder="Enter password" required>
                <button class="btn btn-outline-secondary" type="button" id="togglePassword">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
            </div>
            <small id="passwordStrength" class="form-text text-muted ms-1"></small>
        </div>
    </div>

    <button type="button" class="btn btn-success" onclick="enrolMember()">Enrol Member</button>
</form>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Mapping of Countries & States
    const statesByCountry = {
        "India": ["Karnataka","Kerala", "Maharashtra", "Delhi", "Tamil Nadu"],
        "United States": ["California", "Texas", "New York", "Florida"],
        "United Kingdom": ["England", "Scotland", "Wales", "Northern Ireland"],
        "Canada": ["Ontario", "Quebec", "British Columbia", "Alberta"],
        "Australia": ["New South Wales", "Victoria", "Queensland", "Western Australia"]
    };

    function updateStateOptions(countrySelectId, stateSelectId) {
        const country = document.getElementById(countrySelectId).value;
        const stateSelect = document.getElementById(stateSelectId);
        stateSelect.innerHTML = '<option value="">Select State</option>';

        if (statesByCountry[country]) {
            statesByCountry[country].forEach(state => {
                const option = document.createElement('option');
                option.value = state;
                option.textContent = state;
                stateSelect.appendChild(option);
            });
        }
    }

    document.getElementById('permanentCountry').addEventListener('change', function() {
        updateStateOptions('permanentCountry', 'permanentState');
    });

    document.getElementById('presentCountry').addEventListener('change', function() {
        updateStateOptions('presentCountry', 'presentState');
    });

    // Copy Permanent Address to Present Address
    document.getElementById('sameAsPermanentAddress').addEventListener('change', function () {
        const checked = this.checked;
        if (checked) {
            document.getElementById('presentAddress').value = document.getElementById('permanentAddress').value;
            document.getElementById('presentCity').value = document.getElementById('permanentCity').value;
            document.getElementById('presentCountry').value = document.getElementById('permanentCountry').value;
            updateStateOptions('permanentCountry', 'presentState');
            document.getElementById('presentState').value = document.getElementById('permanentState').value;
            document.getElementById('presentZipCode').value = document.getElementById('permanentZipCode').value;
        }
    });

    // Password Toggle & Strength Checker
    document.getElementById("togglePassword").addEventListener("click", function () {
        const passwordInput = document.getElementById("password");
        const icon = document.getElementById("eyeIcon");
        const type = passwordInput.type === "password" ? "text" : "password";
        passwordInput.type = type;
        icon.className = type === "password" ? "bi bi-eye" : "bi bi-eye-slash";
    });

    document.getElementById("password").addEventListener("input", function () {
        const val = this.value;
        const strengthText = document.getElementById("passwordStrength");
        let strength = "Weak";
        let color = "text-danger";

        if (val.length >= 8 && /[A-Z]/.test(val) && /\d/.test(val) && /[^A-Za-z0-9]/.test(val)) {
            strength = "Strong";
            color = "text-success";
        } else if (val.length >= 6 && (/[A-Z]/.test(val) || /\d/.test(val))) {
            strength = "Medium";
            color = "text-warning";
        }

        strengthText.textContent = `Strength: ${strength}`;
        strengthText.className = `form-text ms-1 ${color}`;
    });

    function enrolMember() {
        const requestBody = {
            givenName: document.getElementById('givenName').value.trim(),
            familyName: document.getElementById('familyName').value.trim(),
            gender: document.getElementById('gender').value.trim(),
            dateOfBirth: document.getElementById('dateOfBirth').value,
            countryOfResidence: document.getElementById('countryOfResidence').value.trim(),
            nationality: document.getElementById('nationality').value.trim(),
            companyCode: document.getElementById('companyCode').value.trim(),
            preferredLanguage: document.getElementById('preferredLanguage').value.trim(),
            preferredAddress: document.getElementById('preferredAddress').value.trim(),
            permanentAddress: document.getElementById('permanentAddress').value.trim(),
            permanentCity: document.getElementById('permanentCity').value.trim(),
            permanentState: document.getElementById('permanentState').value.trim(),
            permanentCountry: document.getElementById('permanentCountry').value.trim(),
            permanentZipCode: document.getElementById('permanentZipCode').value.trim(),
            sameAsPermanentAddress: document.getElementById('sameAsPermanentAddress').checked,
            presentAddress: document.getElementById('presentAddress').value.trim(),
            presentCity: document.getElementById('presentCity').value.trim(),
            presentState: document.getElementById('presentState').value.trim(),
            presentCountry: document.getElementById('presentCountry').value.trim(),
            presentZipCode: document.getElementById('presentZipCode').value.trim(),
            emailAddress: document.getElementById('emailAddress').value.trim(),
            password: document.getElementById('password').value,
            phoneNumber: document.getElementById('phoneNumber').value.trim(),
            mobileNumber: document.getElementById('mobileNumber').value.trim()
        };

        fetch('/api/members/enrol', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(requestBody)
        })
        .then(response => {
            if (!response.ok) {
                return response.text().then(text => {
                    try {
                        const json = JSON.parse(text);
                        const message = json.message || 'Failed to enrol member.';
                        throw new Error(message);
                    } catch {
                        const fallback = response.status === 409
                            ? 'Email already exists. Please use a different email.'
                            : text || 'Failed to enrol member.';
                        throw new Error(fallback);
                    }
                });
            }
            return response.json();
        })
        .then(data => {
            document.getElementById('enrolForm').reset();
            document.getElementById('membershipNumber').textContent = data.membershipNumber;
            const successModal = new bootstrap.Modal(document.getElementById('successModal'));
            successModal.show();
        })
        .catch(err => {
            document.getElementById('errorModalMessage').textContent = err.message;
            const errorModal = new bootstrap.Modal(document.getElementById('errorModal'));
            errorModal.show();
        });
    }
</script>
</body>
</html>
