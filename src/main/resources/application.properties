spring.application.name=restfulAPI

spring.datasource.url=jdbc:postgresql://localhost:5432/loyalty_db
spring.datasource.username=loyalty_user
spring.datasource.password=loyalty_pass

# create/update tables automatically based on Entities
spring.jpa.hibernate.ddl-auto=update

# Show SQL in logs (optional)
spring.jpa.show-sql=true

# Basic Auth user (for example)
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN


# Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

#for constants used in this system
loyalty.bonusPoint=50
loyalty.initialTier=Bronze

loyalty.gold.rate=0.03
loyalty.silver.rate=0.025
loyalty.default.rate=0.02

loyalty.gold.maxPoints=100
loyalty.silver.maxPoints=75
loyalty.default.maxPoints=50

loyalty.gold.memberPoints=62
loyalty.silver.memberPoints=58




